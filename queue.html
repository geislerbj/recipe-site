<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Recipe — Family Recipes</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <a href="/" class="nav-logo">🍴 Family Recipes</a>
  <a href="/">Recipes</a>
  <a href="/meal-plan.html">Meal Plan</a>
  <a href="/shopping.html">Shopping List</a>
  <a href="/queue.html" class="active">Add by URL</a>
</nav>

<main style="max-width:600px;">
  <h1>Add Recipe by URL</h1>
  <p style="color:var(--text-muted);margin-bottom:1.5rem;font-size:0.9rem;">
    Found a recipe online? Paste the link below and it'll be queued for processing.
  </p>

  <div class="card" style="margin-bottom:2rem;">
    <div class="form-group">
      <label>Recipe URL</label>
      <input type="url" id="url-input" placeholder="https://..." />
    </div>
    <button class="btn" id="submit-btn">Add to Queue</button>
    <div id="submit-msg" style="margin-top:0.75rem;font-size:0.85rem;"></div>
  </div>

  <h2>Pending Queue</h2>
  <div id="queue-list" style="margin-top:0.75rem;">
    <div class="empty">No URLs in queue.</div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="queue.js"></script>
</body>
</html>
